name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar dependencias del sistema
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev \
            android-sdk

      - name: Instalar dependencias de Python
        run: |
          python3 -m pip install --upgrade pip
          pip install --user buildozer Cython==0.29.33 virtualenv

      - name: Agregar buildozer al PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Configurar variables de entorno Android
        run: |
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin:$HOME/.buildozer/android/platform/android-sdk/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Aceptar licencias Android
        run: yes | sdkmanager --licenses || true

      - name: Compilar APK
        run: |
          buildozer android clean
          buildozer -v android debug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk